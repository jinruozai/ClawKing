[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "paris"
solc_version = "0.8.27"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

fs_permissions = [{ access = "read", path = "../.env" }]

gas_limit = "18446744073709551615"

[rpc_endpoints]
polygon = "${RPC_URL}"
